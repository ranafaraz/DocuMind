name: Initialize Wiki
on:
  push:
    paths:
      - '.github/workflows/init-wiki.yml'

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Initialize wiki via API + git
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GH_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          git config --global user.name "Rana Faraz"
          git config --global user.email "faraz.ahmed@iub.edu.pk"
          
          # Try to enable wiki via API first
          curl -s -X PATCH \
            -H "Authorization: Bearer $WIKI_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ranafaraz/DocuMind" \
            -d '{"has_wiki":true}' | jq '.has_wiki'
          
          # Try to create wiki page via API
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $WIKI_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/ranafaraz/DocuMind/wiki/pages" \
            -d '{"title":"Home","body":"# DocuMind\n\nInitializing wiki...","format":"markdown"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          echo "API response code: $HTTP_CODE"
          echo "API response: $(echo "$RESPONSE" | head -n-1)"
          
          # Try pushing via git anyway
          mkdir /tmp/wiki && cd /tmp/wiki
          git init
          echo "# DocuMind" > Home.md
          echo "" >> Home.md  
          echo "Initializing wiki..." >> Home.md
          git add Home.md
          git commit -m "docs: initialize wiki"
          git remote add origin "https://ranafaraz:${WIKI_TOKEN}@github.com/ranafaraz/DocuMind.wiki.git"
          git push -u origin master || echo "Push failed - wiki may need manual initialization"